<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K &amp; P</title>
    <meta
      name="description"
      content="A tiny corner of the internet for Pranav & Kashika."
    />
    <link rel="canonical" href="https://kandp.site/" />
    <meta property="og:url" content="https://kandp.site/" />
    <meta property="og:site_name" content="K & P" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- Closed cover -->
    <div class="cover" id="cover">
      <div class="cover-title">K &amp; P</div>
      <div class="cover-heart">&hearts;</div>
      <div class="cover-hint">tap to open</div>
    </div>

    <!-- Open notebook (built dynamically from poems/*.txt) -->
    <div class="notebook hidden" id="notebook">
      <div class="notebook-bg"></div>
      <button class="nav-arrow nav-prev" id="prev" aria-label="Previous page">&lsaquo;</button>
      <div id="spreads"></div>
      <div class="spine"></div>
      <button class="nav-arrow nav-next" id="next" aria-label="Next page">&rsaquo;</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
