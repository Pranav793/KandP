<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Us &bull; K &amp; P</title>
    <meta name="description" content="Our photo gallery — Pranav & Kashika." />
    <link rel="canonical" href="https://kandp.site/us/" />
    <meta property="og:url" content="https://kandp.site/us/" />
    <meta property="og:site_name" content="K & P" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      html, body {
        overflow: auto;
      }

      body {
        flex-direction: column;
        padding: 40px 24px 60px;
        gap: 32px;
        min-height: 100%;
        height: auto;
      }

      .gallery-header {
        text-align: center;
        max-width: 600px;
      }

      .gallery-title {
        font-family: var(--font-page);
        font-size: clamp(36px, 6vw, 56px);
        color: var(--ink);
        margin-bottom: 8px;
      }

      .gallery-subtitle {
        font-family: var(--font-page);
        font-size: 18px;
        color: var(--ink-faint);
      }

      .gallery-back {
        display: inline-block;
        margin-top: 12px;
        font-family: var(--font-page);
        font-size: 16px;
        color: var(--accent);
        text-decoration: none;
        transition: color 200ms ease;
      }

      .gallery-back:hover {
        color: var(--ink);
      }

      /* ── Grid ──────────────────────────────────── */

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 28px;
        width: 100%;
        max-width: 1000px;
      }

      .gallery-empty {
        grid-column: 1 / -1;
        text-align: center;
        padding: 60px 24px;
        border: 2px dashed var(--accent);
        border-radius: var(--radius);
        background: rgba(196, 114, 127, 0.04);
      }

      .gallery-empty-title {
        font-family: var(--font-page);
        font-size: 24px;
        color: var(--accent);
        margin-bottom: 8px;
      }

      .gallery-empty-desc {
        font-family: var(--font-page);
        font-size: 16px;
        color: var(--ink-faint);
      }

      /* ── Polaroid cards ────────────────────────── */

      .polaroid {
        background: var(--page-bg);
        border: 1px solid rgba(0, 0, 0, 0.08);
        padding: 10px 10px 32px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        transition: transform 300ms ease, box-shadow 300ms ease;
        cursor: pointer;
        opacity: 0;
        animation: fade-up 0.5s ease forwards;
      }

      .polaroid:nth-child(3n+1) { transform: rotate(-2deg); }
      .polaroid:nth-child(3n+2) { transform: rotate(1.5deg); }
      .polaroid:nth-child(3n+3) { transform: rotate(-0.5deg); }

      .polaroid:hover {
        transform: rotate(0deg) scale(1.04);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.14);
      }

      .polaroid img {
        display: block;
        width: 100%;
        aspect-ratio: 4 / 5;
        object-fit: cover;
        background: #eee;
        border-radius: 2px;
      }

      .polaroid .caption {
        font-family: var(--font-page);
        font-size: 15px;
        color: var(--ink-light);
        text-align: center;
        margin-top: 10px;
        min-height: 1em;
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* stagger the animation per card */
      .polaroid:nth-child(1)  { animation-delay: 0s; }
      .polaroid:nth-child(2)  { animation-delay: 0.06s; }
      .polaroid:nth-child(3)  { animation-delay: 0.12s; }
      .polaroid:nth-child(4)  { animation-delay: 0.18s; }
      .polaroid:nth-child(5)  { animation-delay: 0.24s; }
      .polaroid:nth-child(6)  { animation-delay: 0.30s; }
      .polaroid:nth-child(7)  { animation-delay: 0.36s; }
      .polaroid:nth-child(8)  { animation-delay: 0.42s; }
      .polaroid:nth-child(9)  { animation-delay: 0.48s; }
      .polaroid:nth-child(10) { animation-delay: 0.54s; }

      /* ── Lightbox ──────────────────────────────── */

      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.88);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 250ms ease;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .lightbox.open {
        opacity: 1;
        pointer-events: auto;
      }

      .lightbox img {
        max-width: 90vw;
        max-height: 88vh;
        object-fit: contain;
        border-radius: 6px;
        box-shadow: 0 12px 60px rgba(0, 0, 0, 0.5);
        transition: transform 250ms ease;
      }

      .lightbox .lb-caption {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--font-page);
        font-size: 18px;
        color: rgba(255, 255, 255, 0.8);
        text-align: center;
        max-width: 80vw;
      }

      .lightbox .lb-close {
        position: absolute;
        top: 20px;
        right: 24px;
        width: 40px;
        height: 40px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 200ms ease;
      }

      .lightbox .lb-close:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .lightbox .lb-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 200ms ease;
      }

      .lightbox .lb-nav:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .lb-prev { left: 16px; }
      .lb-next { right: 16px; }

      /* ── Responsive ────────────────────────────── */

      @media (max-width: 580px) {
        body { padding: 24px 16px 48px; gap: 24px; }

        .gallery-grid {
          grid-template-columns: 1fr 1fr;
          gap: 16px;
        }

        .polaroid {
          padding: 6px 6px 22px;
        }

        .polaroid .caption {
          font-size: 13px;
          margin-top: 6px;
        }

        .lightbox .lb-nav {
          width: 36px;
          height: 36px;
          font-size: 18px;
        }

        .lb-prev { left: 8px; }
        .lb-next { right: 8px; }
      }
    </style>
  </head>
  <body>

    <div class="gallery-header">
      <div class="gallery-title">Us</div>
      <div class="gallery-subtitle">Our photos, all in one place.</div>
      <a class="gallery-back" href="../">&larr; back to the notebook</a>
    </div>

    <div class="gallery-grid" id="grid"></div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lb-close" aria-label="Close">&times;</button>
      <button class="lb-nav lb-prev" aria-label="Previous">&lsaquo;</button>
      <img src="" alt="" />
      <button class="lb-nav lb-next" aria-label="Next">&rsaquo;</button>
      <div class="lb-caption"></div>
    </div>

    <script>
      const R2 = "https://img.kandp.site";
      const grid = document.getElementById("grid");
      const lightbox = document.getElementById("lightbox");
      const lbImg = lightbox.querySelector("img");
      const lbCaption = lightbox.querySelector(".lb-caption");
      let photos = [];
      let lbIndex = 0;

      async function init() {
        try {
          photos = await fetch("photos.json").then((r) => r.json());
        } catch {
          photos = [];
        }

        if (!photos.length) {
          grid.innerHTML =
            `<div class="gallery-empty">` +
            `<div class="gallery-empty-title">memories go here</div>` +
            `<div class="gallery-empty-desc">Add photos to photos.json to get started.</div>` +
            `</div>`;
          return;
        }

        photos.forEach((p, i) => {
          const src = typeof p === "string" ? p : p.src;
          const caption = (typeof p === "object" && p.caption) || "";
          const card = document.createElement("div");
          card.className = "polaroid";
          card.innerHTML =
            `<img src="${R2}/${src}" alt="${caption || "Photo " + (i + 1)}" loading="lazy" />` +
            `<div class="caption">${caption}</div>`;
          card.addEventListener("click", () => openLightbox(i));
          grid.appendChild(card);
        });
      }

      function openLightbox(index) {
        lbIndex = index;
        updateLightbox();
        lightbox.classList.add("open");
      }

      function closeLightbox() {
        lightbox.classList.remove("open");
      }

      function updateLightbox() {
        const p = photos[lbIndex];
        const src = typeof p === "string" ? p : p.src;
        const caption = (typeof p === "object" && p.caption) || "";
        lbImg.src = `${R2}/${src}`;
        lbImg.alt = caption || `Photo ${lbIndex + 1}`;
        lbCaption.textContent = caption;
      }

      function lbPrev() {
        lbIndex = (lbIndex - 1 + photos.length) % photos.length;
        updateLightbox();
      }

      function lbNext() {
        lbIndex = (lbIndex + 1) % photos.length;
        updateLightbox();
      }

      lightbox.querySelector(".lb-close").addEventListener("click", closeLightbox);
      lightbox.querySelector(".lb-prev").addEventListener("click", lbPrev);
      lightbox.querySelector(".lb-next").addEventListener("click", lbNext);

      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) closeLightbox();
      });

      document.addEventListener("keydown", (e) => {
        if (!lightbox.classList.contains("open")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") lbPrev();
        if (e.key === "ArrowRight") lbNext();
      });

      init();
    </script>
  </body>
</html>
